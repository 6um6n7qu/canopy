version: '3.8'

services:
  canopy:
    build:
      context: .
      dockerfile: .docker/Dockerfile
    container_name: canopy-node
    restart: unless-stopped
    ports:
      - "${P2P_PORT:-8080}:8080"
      - "${RPC_PORT:-50832}:50832"
      - "${ADMIN_PORT:-50833}:50833"
    volumes:
      - canopy-data:/root/.canopy
    environment:
      - CANOPY_HOME=/root/.canopy
      - LOG_LEVEL=${LOG_LEVEL:-info}
    networks:
      - canopy-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:50832/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  canopy-auto-update:
    build:
      context: .docker/auto-update
      dockerfile: Dockerfile
    container_name: canopy-auto-update
    restart: unless-stopped
    depends_on:
      - canopy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - canopy-data:/root/.canopy
    environment:
      - TARGET_CONTAINER=canopy-node
      - UPDATE_INTERVAL=${UPDATE_INTERVAL:-3600}
      - CANOPY_REPO=${CANOPY_REPO:-canopy-network/canopy}
    networks:
      - canopy-net

volumes:
  canopy-data:
    driver: local

networks:
  canopy-net:
    driver: bridge
